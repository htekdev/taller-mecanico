name: E2E Tests

on:
  deployment_status:

concurrency:
  # Group by deployment SHA so multiple events for the same commit deduplicate,
  # but different commits (from separate pushes) never cancel each other's E2E runs.
  group: e2e-${{ github.event.deployment.sha }}
  cancel-in-progress: true

jobs:
  e2e:
    # Only run when Vercel deploys successfully
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # Required for posting PR comments
    permissions:
      contents: read
      pull-requests: write
      issues: write

    env:
      BASE_URL: ${{ github.event.deployment_status.target_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const commitSha = context.payload.deployment.sha || context.sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha,
            });
            const prNumber = prs.length > 0 ? prs[0].number : 0;
            core.setOutput('number', prNumber);
            console.log(`Resolved PR #${prNumber} from commit ${commitSha}`);

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: npx playwright test --config=e2e/playwright.config.ts

      - name: Upload results to S3
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: npx tsx e2e/upload-results.ts --project taller-mecanico --pr ${{ steps.pr.outputs.number }}

      - name: Read results
        if: always()
        id: results
        run: |
          if [ -f e2e/results/results.json ]; then
            echo "has_results=true" >> $GITHUB_OUTPUT
            TOTAL=$(jq '.summary.total' e2e/results/results.json)
            PASSED=$(jq '.summary.passed' e2e/results/results.json)
            FAILED=$(jq '.summary.failed' e2e/results/results.json)
            echo "total=$TOTAL" >> $GITHUB_OUTPUT
            echo "passed=$PASSED" >> $GITHUB_OUTPUT
            echo "failed=$FAILED" >> $GITHUB_OUTPUT
          else
            echo "has_results=false" >> $GITHUB_OUTPUT
          fi

      - name: Post results to PR
        if: always() && steps.results.outputs.has_results == 'true' && steps.pr.outputs.number != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('e2e/results/results.json', 'utf-8'));

            const statusEmoji = results.summary.failed > 0 ? '❌' : '✅';
            const rows = results.tests.map(t => {
              const status = t.status === 'passed' ? '✅' : t.status === 'failed' ? '❌' : '⏭️';
              const video = t.video
                ? `[📹 Watch](${t.video.replace('s3://htek-dev-media/', 'https://htek-dev-media.s3.amazonaws.com/')})`
                : '—';
              return `| ${t.name} | ${status} | ${video} |`;
            });

            const reportUrl = results.report.replace(
              's3://htek-dev-media/',
              'https://htek-dev-media.s3.amazonaws.com/'
            );

            const prNumber = ${{ steps.pr.outputs.number }};

            const bodyLines = [
              '## 🎬 E2E Test Results',
              '',
              `**Suite:** ${results.suite} | **PR:** #${prNumber} | **URL:** ${results.baseURL}`,
              `**Result:** ${statusEmoji} ${results.summary.passed}/${results.summary.total} passed | ❌ ${results.summary.failed} failed | ⏱️ ${(results.duration / 1000).toFixed(1)}s`,
              '',
              '| Test | Status | Video |',
              '|------|--------|-------|',
              rows.join('\n'),
              '',
              `[📊 Full HTML Report](${reportUrl})`,
            ];

            const body = bodyLines.join('\n');

            // Delete previous E2E comment if exists (keep PR clean)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(c => c.body?.includes('## 🎬 E2E Test Results'));
            if (existingComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            console.log(`Posted E2E results to PR #${prNumber}`);

      - name: Upload Playwright report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/results/
          retention-days: 30
