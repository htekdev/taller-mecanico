name: E2E Tests

on:
  deployment_status:

concurrency:
  # Group by deployment SHA so multiple events for the same commit deduplicate,
  # but different commits (from separate pushes) never cancel each other's E2E runs.
  group: e2e-${{ github.event.deployment.sha }}
  cancel-in-progress: true

jobs:
  # ── Resolve the PR number once, share it across all shard jobs ───────────
  resolve-pr:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    outputs:
      number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const commitSha = context.payload.deployment.sha || context.sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: commitSha,
            });
            const prNumber = prs.length > 0 ? prs[0].number : 0;
            core.setOutput('number', prNumber);
            console.log(`Resolved PR #${prNumber} from commit ${commitSha}`);

  # ── Run two parallel shards to halve CI time and reduce per-runner load ──
  e2e:
    needs: resolve-pr
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    # Each shard runs ~half the suite (~70 tests × ~49 s avg). 60 min + buffer.
    timeout-minutes: 60

    strategy:
      fail-fast: false   # Let both shards finish even if one fails
      matrix:
        shard: [1, 2]

    # Required for posting PR comments (used by post-comment job)
    permissions:
      contents: read
      pull-requests: write
      issues: write

    env:
      BASE_URL: ${{ github.event.deployment_status.target_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.number }}
        run: npx playwright test --config=e2e/playwright.config.ts --shard=${{ matrix.shard }}/2

      - name: Upload results to S3 (shard ${{ matrix.shard }})
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
          PR_NUMBER: ${{ needs.resolve-pr.outputs.number }}
        run: npx tsx e2e/upload-results.ts --project taller-mecanico --pr ${{ needs.resolve-pr.outputs.number }}

      - name: Save shard results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          path: e2e/results/results.json
          retention-days: 1

      - name: Upload Playwright report artifact (shard ${{ matrix.shard }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: e2e/results/
          retention-days: 30

  # ── Combined PR comment after all shards complete ─────────────────────────
  post-comment:
    needs: [resolve-pr, e2e]
    if: always() && needs.resolve-pr.outputs.number != '0'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Download shard results
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-results-shard-*
          path: shard-results/

      - name: Post combined results to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const prNumber = ${{ needs.resolve-pr.outputs.number }};

            let totalPassed = 0, totalFailed = 0, totalSkipped = 0;
            const shardRows = [];

            for (const shard of ['1', '2']) {
              const resultsPath = path.join(
                'shard-results',
                `e2e-results-shard-${shard}`,
                'results.json'
              );
              if (!fs.existsSync(resultsPath)) {
                shardRows.push(`| Shard ${shard}/2 | ⚠️ No results uploaded | — |`);
                continue;
              }
              const results = JSON.parse(fs.readFileSync(resultsPath, 'utf-8'));
              const { passed, failed, skipped, total } = results.summary;
              totalPassed += passed;
              totalFailed += failed;
              totalSkipped += skipped;

              const statusEmoji = failed > 0 ? '❌' : '✅';
              const reportUrl = results.report
                ? results.report.replace('s3://htek-dev-media/', 'https://htek-dev-media.s3.amazonaws.com/')
                : null;
              const reportLink = reportUrl ? `[📊 Report](${reportUrl})` : '—';
              shardRows.push(`| Shard ${shard}/2 | ${statusEmoji} ${passed}/${total} passed | ${reportLink} |`);
            }

            const missingShardsCount = shardRows.filter(r => r.includes('No results')).length;
            const overallStatus = totalFailed > 0 ? '❌' : (missingShardsCount > 0 ? '⚠️' : '✅');
            const totalAll = totalPassed + totalFailed + totalSkipped;

            const bodyLines = [
              '## 🎬 E2E Test Results',
              '',
              `**PR:** #${prNumber} | **Result:** ${overallStatus} ${totalPassed}/${totalAll} passed | ❌ ${totalFailed} failed | ⏭️ ${totalSkipped} skipped`,
              ...(missingShardsCount > 0 ? [`> ⚠️ **${missingShardsCount} shard(s) missing results** — totals above are incomplete.`] : []),
              '',
              '| Shard | Status | Report |',
              '|-------|--------|--------|',
              ...shardRows,
            ];

            const body = bodyLines.join('\n');

            // Replace any previous E2E comment (keeps PR clean)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body?.includes('## 🎬 E2E Test Results'));
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

            console.log(`Posted combined E2E results to PR #${prNumber}`);
