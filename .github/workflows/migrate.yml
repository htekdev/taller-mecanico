name: Apply Database Migrations

on:
  # Manual trigger — run after merging to main to apply pending migrations
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (production or staging)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

  # Auto-trigger on merge to main (after CI passes)
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Apply pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Applying migrations to project fzondawpxhkojszrwgck..."
          supabase db push --project-ref fzondawpxhkojszrwgck
          echo "✅ Migrations applied successfully"

      - name: Verify critical columns exist
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Verifying critical columns..."
          supabase db execute --project-ref fzondawpxhkojszrwgck --sql \
            "SELECT column_name FROM information_schema.columns WHERE table_name = 'trabajos' AND column_name IN ('numero_orden', 'kilometraje') ORDER BY column_name" \
            2>&1 | tee /tmp/verify.txt
          if grep -q "numero_orden" /tmp/verify.txt && grep -q "kilometraje" /tmp/verify.txt; then
            echo "✅ All critical columns verified"
          else
            echo "❌ Missing columns — check migration output"
            exit 1
          fi
